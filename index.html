<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EcoScan | AI Waste Intelligence</title>
    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --primary: #10b981;
            --primary-glow: rgba(16, 185, 129, 0.3);
            --bg: #020617;
            --surface: #0f172a;
            --border: rgba(255, 255, 255, 0.08);
            --text-main: #f1f5f9;
            --text-muted: #94a3b8;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }

        body { 
            font-family: 'Plus Jakarta Sans', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            overflow-x: hidden;
        }

        .glow {
            position: fixed;
            width: 400px;
            height: 400px;
            background: radial-gradient(circle, var(--primary-glow) 0%, transparent 70%);
            z-index: -1;
            filter: blur(60px);
        }

        .dashboard {
            display: grid;
            grid-template-columns: 280px 1fr;
            gap: 24px;
            width: 95%;
            max-width: 1100px;
            height: 700px;
            background: rgba(15, 23, 42, 0.8);
            backdrop-filter: blur(20px);
            border: 1px solid var(--border);
            border-radius: 32px;
            padding: 24px;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        }

        .sidebar {
            background: rgba(255, 255, 255, 0.03);
            border-radius: 24px;
            padding: 32px 24px;
            border: 1px solid var(--border);
            display: flex;
            flex-direction: column;
        }

        .logo-area h1 { font-size: 1.5rem; font-weight: 800; letter-spacing: -1px; margin-bottom: 8px; }
        .logo-area span { color: var(--primary); }
        .sidebar p { font-size: 0.85rem; color: var(--text-muted); line-height: 1.6; }

        .steps { margin-top: 40px; }
        .step { display: flex; align-items: center; gap: 12px; margin-bottom: 24px; font-size: 0.9rem; color: var(--text-muted); }
        .step-num { width: 24px; height: 24px; background: var(--primary); color: white; border-radius: 6px; display: grid; place-items: center; font-weight: bold; font-size: 0.75rem; }

        .scanner-view {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: relative;
        }

        .status-bar {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: rgba(255, 255, 255, 0.03);
            padding: 12px 24px;
            border-radius: 16px;
            font-size: 0.8rem;
            border: 1px solid var(--border);
        }

        .pulse { width: 8px; height: 8px; background: var(--primary); border-radius: 50%; box-shadow: 0 0 10px var(--primary); animation: blink 1.5s infinite; }

        .drop-zone {
            flex-grow: 1;
            border: 2px dashed #334155;
            border-radius: 24px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: 0.3s;
            position: relative;
            overflow: hidden;
            background: rgba(0,0,0,0.2);
        }

        .drop-zone:hover { border-color: var(--primary); background: rgba(16, 185, 129, 0.05); }

        #displayImage { 
            display: none; 
            max-width: 90%; 
            max-height: 90%; 
            object-fit: contain; 
            border-radius: 16px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.3);
            z-index: 1;
        }

        .upload-btn {
            background: var(--primary);
            color: white;
            padding: 14px 28px;
            border-radius: 14px;
            font-weight: 700;
            cursor: pointer;
            transition: 0.3s;
            z-index: 2;
        }

        .upload-btn:hover { transform: translateY(-2px); box-shadow: 0 10px 20px var(--primary-glow); }

        #reset-scan {
            background: rgba(255,255,255,0.05);
            color: white;
            padding: 10px 20px;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            z-index: 2;
            display: none;
            font-size: 0.8rem;
            margin-top: 10px;
            border: 1px solid var(--border);
        }

        .result-panel {
            background: #1e293b;
            border-radius: 20px;
            padding: 24px;
            display: grid;
            grid-template-columns: 1fr auto;
            align-items: center;
            border: 1px solid var(--border);
            transform: translateY(10px);
            opacity: 0;
            transition: 0.5s;
        }

        .result-panel.active { transform: translateY(0); opacity: 1; }

        .result-info h3 { font-size: 0.8rem; color: var(--text-muted); text-transform: uppercase; margin-bottom: 4px; }
        .result-info div { font-size: 1.6rem; font-weight: 800; color: #fff; }

        .confidence-tag {
            background: rgba(16, 185, 129, 0.15);
            color: var(--primary);
            padding: 8px 16px;
            border-radius: 100px;
            font-weight: 700;
            font-size: 0.9rem;
        }

        @keyframes blink { 0%, 100% { opacity: 1; } 50% { opacity: 0.3; } }
    </style>
</head>
<body>

    <div class="glow" style="top: -100px; left: -100px;"></div>
    <div class="glow" style="bottom: -100px; right: -100px; background: radial-gradient(circle, rgba(56, 189, 248, 0.2) 0%, transparent 70%);"></div>

    <div class="dashboard">
        <div class="sidebar">
            <div class="logo-area">
                <h1>Eco<span>Scan</span></h1>
                <p>Advanced Computer Vision for Sustainable Future</p>
            </div>

            <div class="steps">
                <div class="step"><div class="step-num">1</div> Upload photo</div>
                <div class="step"><div class="step-num">2</div> AI Processing</div>
                <div class="step"><div class="step-num">3</div> Verify Results</div>
            </div>

            <div style="margin-top: auto;">
                <p style="font-size: 0.7rem;">VERSION 2.4.0 (STABLE)<br>Engine: TensorFlow Web v4.0</p>
            </div>
        </div>

        <div class="scanner-view">
            <div class="status-bar">
                <div style="display: flex; align-items: center; gap: 10px;">
                    <div class="pulse"></div>
                    <span id="status">Engine Offline</span>
                </div>
                <span style="color: var(--text-muted)">Location: Karachi, PK</span>
            </div>

            <div class="drop-zone" id="dropZone">
                <img id="displayImage" src="">
                <label for="imageUpload" class="upload-btn" id="startBtn">Initialize Scan</label>
                <button id="reset-scan">Start New Scan</button>
                <input type="file" id="imageUpload" accept="image/*" style="display: none;">
                <p id="instructionText" style="margin-top: 15px; color: var(--text-muted); font-size: 0.8rem;">Drag and drop or browse local files</p>
            </div>

            <div class="result-panel" id="resultPanel">
                <div class="result-info">
                    <h3>Identified Material</h3>
                    <div id="materialLabel">N/A</div>
                </div>
                <div class="confidence-tag" id="confidenceVal">0%</div>
            </div>
        </div>
    </div>

    <script>
        const LABELS = [
            "Aerosols", "Aluminum can", "Aluminum caps", "Cardboard", "Cellulose", 
            "Ceramic", "Combined plastic", "Container for household chemicals", 
            "Disposable tableware", "Electronics", "Foil", "Furniture", 
            "Glass bottle", "Iron utensils", "Liquid", "Metal shavings", 
            "Milk bottle", "Organic", "Paper bag", "Paper cups", 
            "Paper shavings", "Paper", "Papier mache", "Plastic bag", 
            "Plastic bottle", "Plastic can", "Plastic canister", "Plastic caps", 
            "Plastic cup", "Plastic shaker", "Plastic shavings", "Plastic toys", 
            "Postal packaging", "Printing industry", "Scrap metal", "Stretch film", 
            "Tetra pack", "Textile", "Tin", "Unknown plastic", 
            "Wood", "Zip plastic bag", "Ramen Cup", "Food Packet"
        ];

        let model;
        const upload = document.getElementById('imageUpload');
        const img = document.getElementById('displayImage');
        const status = document.getElementById('status');
        const materialLabel = document.getElementById('materialLabel');
        const confidenceVal = document.getElementById('confidenceVal');
        const resultPanel = document.getElementById('resultPanel');
        const instructionText = document.getElementById('instructionText');
        const startBtn = document.getElementById('startBtn');
        const resetBtn = document.getElementById('reset-scan');

        async function init() {
            try {
                model = await tf.loadGraphModel('best_web_model/model.json');
                status.innerText = "Engine Active • Online";
            } catch (e) {
                status.innerText = "Network Error";
                status.style.color = "#ef4444";
            }
        }

        upload.addEventListener('change', (e) => {
            const file = e.target.files[0];
            if (!file) return;
            const reader = new FileReader();
            reader.onload = (event) => {
                img.src = event.target.result;
                img.style.display = "block";
                instructionText.style.display = "none";
                resultPanel.classList.remove('active');
                startBtn.style.display = "none";
                resetBtn.style.display = "block";
                img.onload = () => runInference();
            };
            reader.readAsDataURL(file);
        });
        
        resetBtn.addEventListener('click', () => {
            img.style.display = "none";
            instructionText.style.display = "block";
            startBtn.style.display = "inline-block";
            resetBtn.style.display = "none";
            resultPanel.classList.remove('active');
            status.innerText = "Engine Active • Online";
            upload.value = "";
        });

        async function runInference() {
            status.innerText = "Neural Processing...";
            const input = tf.tidy(() => {
                return tf.image.resizeBilinear(tf.browser.fromPixels(img), [640, 640])
                    .div(255.0)
                    .expandDims(0);
            });
            const res = model.execute(input);
            const data = await res.squeeze().transpose().array();
            let highestScore = 0;
            let bestLabel = "";
            data.forEach(row => {
                const scores = row.slice(4);
                const maxScore = Math.max(...scores);
                if (maxScore > highestScore) {
                    highestScore = maxScore;
                    bestLabel = LABELS[scores.indexOf(maxScore)];
                }
            });
            if (highestScore > 0.20) {
                materialLabel.innerText = bestLabel;
                confidenceVal.innerText = `${Math.round(highestScore * 100)}% CONFIDENCE`;
                resultPanel.classList.add('active');
                status.innerText = "Scan Complete";
            } else {
                status.innerText = "Low Confidence Detection";
                materialLabel.innerText = "Unknown Object";
                confidenceVal.innerText = "0%";
                resultPanel.classList.add('active');
            }
            input.dispose();
            res.dispose();
        }
        init();
    </script>
</body>
</html>
